profile = "deep-review"

# Top-level settings apply to Codex CLI and (when profiles aren't supported) the IDE extension.
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
personality = "pragmatic"

sandbox_mode = "workspace-write"
web_search = "live"

history.persistence = "save-all"
history.max_bytes = 104857600

[profiles.deep-review]
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
personality = "pragmatic"
sandbox_mode = "workspace-write"
web_search = "live"
history.persistence = "save-all"
history.max_bytes = 104857600

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem@2026.1.14", "."]
cwd = "."

[mcp_servers.git]
command = "npx"
args = ["-y", "@cyanheads/git-mcp-server@2.8.4"]
cwd = "."
env = { MCP_LOG_LEVEL = "error", GIT_BASE_DIR = "." }

[mcp_servers.fetch]
command = "npx"
args = ["-y", "@lmcc-dev/mult-fetch-mcp-server@1.3.2"]
cwd = "."
env = { MCP_LANG = "en" }

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@0.0.68"]
cwd = "."

[mcp_servers.openai_docs]
url = "https://developers.openai.com/mcp"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GH_TOKEN"

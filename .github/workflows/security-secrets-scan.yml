name: Security Secrets Scan (Scoped)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run scoped secrets scan
        run: |
          set -euo pipefail
          bash scripts/gates/security-secrets-scan.sh

name: ISA CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  typescript-check:
    name: TypeScript Type Checking
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run TypeScript compiler
        run: npx tsc --noEmit
        continue-on-error: true
      
      - name: Check TypeScript error count
        run: |
          ERROR_COUNT=$(npx tsc --noEmit 2>&1 | grep -c "error TS" || true)
          echo "TypeScript errors found: $ERROR_COUNT"
          if [ "$ERROR_COUNT" -gt 2 ]; then
            echo "❌ TypeScript error count ($ERROR_COUNT) exceeds threshold (2)"
            echo "Current known errors:"
            echo "  - GovernanceDocuments.tsx:276 (Drizzle ORM type inference)"
            echo "  - NewsDetail.tsx:119 (Drizzle ORM type inference)"
            exit 1
          else
            echo "✅ TypeScript error count within acceptable threshold"
          fi

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run ESLint
        run: pnpm run lint || echo "⚠️ Linting issues found (non-blocking)"

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: mysql://test:test@localhost:3306/isa_test
      JWT_SECRET: test-secret-key-for-ci
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: isa_test
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run database migrations
        run: pnpm db:push
      
      - name: Run tests
        run: pnpm test --run
        continue-on-error: true
      
      - name: Check test pass rate
        run: |
          # Extract pass rate from test output
          PASS_RATE=$(pnpm test --run 2>&1 | grep -oP '\d+(?=% pass)' || echo "0")
          echo "Test pass rate: $PASS_RATE%"
          if [ "$PASS_RATE" -lt 85 ]; then
            echo "❌ Test pass rate ($PASS_RATE%) below threshold (85%)"
            exit 1
          else
            echo "✅ Test pass rate acceptable"
          fi

  build:
    name: Production Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build project
        run: pnpm run build
        env:
          NODE_ENV: production
      
      - name: Check build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed - dist directory not found"
            exit 1
          fi
          echo "✅ Build successful"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Run security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

name: rag-eval-fixtures

on:
  pull_request:
    branches: [ main ]
    paths:
      - "data/metadata/rag_eval_fixtures_v1.json"
      - "scripts/run-rag-evaluation-fixtures.cjs"
      - "docs/quality/schemas/rag-eval.schema.json"
      - ".github/workflows/rag-eval-fixtures.yml"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  ISA_IMPLEMENTATION_ONLY_MODE: "true"

jobs:
  rag-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Implementation-only mode (rag eval paused)
        if: env.ISA_IMPLEMENTATION_ONLY_MODE == 'true'
        run: |
          set -euo pipefail
          echo "READY=implementation_only_mode_eval_paused"
          {
            echo "## RAG Eval Fixtures"
            echo ""
            echo "- ISA_IMPLEMENTATION_ONLY_MODE=true"
            echo "- Fixture RAG eval and schema validation are paused in implementation-only mode."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate fixture-based rag-eval artifact
        if: env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        run: |
          set -euo pipefail
          node scripts/run-rag-evaluation-fixtures.cjs \
            --fixtures data/metadata/rag_eval_fixtures_v1.json \
            --out test-results/ci/rag-eval.json

      - name: Validate rag-eval artifact against schema (AJV)
        if: env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        run: |
          set -euo pipefail
          npm install -g ajv-cli
          ajv validate \
            -s docs/quality/schemas/rag-eval.schema.json \
            -d test-results/ci/rag-eval.json \
            --strict=false

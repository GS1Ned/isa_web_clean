name: Console Usage Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install -g eslint
        
      - name: Check for console usage in server code
        run: |
          npx eslint --no-eslintrc --config .eslintrc.server.json 'server/**/*.ts' 'server/**/*.js' --max-warnings 0
          
      - name: Report results
        if: failure()
        run: |
          echo "❌ Console usage detected in server code. Please use serverLogger instead."
          echo "See docs/SERVERLOGGER_INTEGRATION.md for migration guide."

name: ISA Capability Eval Nightly

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      stage:
        description: "Evaluation stage"
        required: false
        default: "stage_a"
        type: choice
        options:
          - stage_a
          - stage_b
          - stage_c

permissions:
  contents: read
  issues: write

env:
  ISA_IMPLEMENTATION_ONLY_MODE: "true"

jobs:
  nightly-capability-eval:
    name: Nightly Capability Evaluation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"

      - name: Install proof artifact tooling
        if: env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ripgrep
          npm install -g ajv-cli

      - name: Resolve stage and drift baseline
        id: baseline
        run: |
          set -euo pipefail
          STAGE="${{ github.event.inputs.stage || 'stage_a' }}"
          BASELINE_PATH="$(node scripts/eval/resolve-baseline-path.cjs --stage "$STAGE")"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
          echo "baseline_path=$BASELINE_PATH" >> "$GITHUB_OUTPUT"

      - name: Implementation-only mode (nightly eval paused)
        if: env.ISA_IMPLEMENTATION_ONLY_MODE == 'true'
        run: |
          set -euo pipefail
          echo "READY=implementation_only_mode_eval_paused"
          {
            echo "## Nightly Capability Eval"
            echo ""
            echo "- ISA_IMPLEMENTATION_ONLY_MODE=true"
            echo "- Stage: `${{ steps.baseline.outputs.stage }}`"
            echo "- Baseline path: `${{ steps.baseline.outputs.baseline_path }}`"
            echo "- Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Eval/assert/drift/quality-regression issue steps are paused in implementation-only mode."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Restore drift history cache
        if: env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        id: restore-history
        uses: actions/cache/restore@v4
        with:
          path: test-results/ci/isa-capability-eval-history.json
          key: isa-capability-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            isa-capability-history-${{ github.ref_name }}-

      - name: Run unified capability evaluation
        if: env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        run: |
          set -euo pipefail
          node scripts/eval/run-capability-evals.cjs \
            --registry data/evaluation/golden/registry.json \
            --thresholds docs/quality/thresholds/isa-capability-thresholds.json \
            --stage "${{ steps.baseline.outputs.stage }}" \
            --out-json test-results/ci/isa-capability-eval.json \
            --run-id nightly-${{ github.run_id }}

      - name: Assert advisory-first thresholds
        if: env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        id: assert
        continue-on-error: true
        run: |
          set -euo pipefail
          node scripts/eval/assert-capability-thresholds.cjs \
            --in test-results/ci/isa-capability-eval.json

      - name: Detect capability drift
        if: env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        id: drift
        continue-on-error: true
        run: |
          set -euo pipefail
          node scripts/eval/drift-detect.cjs \
            --eval test-results/ci/isa-capability-eval.json \
            --baseline "${{ steps.baseline.outputs.baseline_path }}" \
            --history test-results/ci/isa-capability-eval-history.json \
            --out test-results/ci/isa-drift-report.json

      - name: Build knowledge verification posture artifact
        if: env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        run: |
          set -euo pipefail
          bash scripts/gates/knowledge-verification-posture.sh \
            test-results/ci/knowledge-verification-posture.json

      - name: Validate proof artifacts
        if: env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        run: |
          set -euo pipefail
          bash scripts/gates/validate-proof-artifacts.sh

      - name: Publish nightly capability summary
        if: always() && env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        run: |
          FIXTURE_VERSIONS="unknown"
          BLOCKING_METRICS="unknown"
          if [[ -f "test-results/ci/isa-capability-eval.json" ]]; then
            FIXTURE_VERSIONS="$(jq -r '[.capabilities[] | "\(.capability)=\(.fixture_version // "unknown")"] | join(", ")' test-results/ci/isa-capability-eval.json)"
            BLOCKING_METRICS="$(jq -r '[.capabilities[].metrics[] | select(.status=="fail" and .enforcement=="fail") | "\(.capability):\(.metric_id)=\(.value)"] | if length==0 then "none" else join("; ") end' test-results/ci/isa-capability-eval.json)"
          fi
          {
            echo "## Nightly Capability Eval";
            echo "";
            echo "- Stage: `${{ steps.baseline.outputs.stage }}`";
            echo "- Baseline path: `${{ steps.baseline.outputs.baseline_path }}`";
            echo "- Threshold assertion outcome: `${{ steps.assert.outcome }}`";
            echo "- Drift detection outcome: `${{ steps.drift.outcome }}`";
            echo "- Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}";
            echo "- Fixture versions: ${FIXTURE_VERSIONS}";
            echo "- Blocking metrics: ${BLOCKING_METRICS}";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload nightly capability artifacts
        if: always() && env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-capability-eval
          path: |
            test-results/ci/isa-capability-eval.json
            test-results/ci/isa-drift-report.json
            test-results/ci/isa-capability-eval-history.json
            test-results/ci/knowledge-verification-posture.json

      - name: Save drift history cache
        if: always() && env.ISA_IMPLEMENTATION_ONLY_MODE != 'true'
        uses: actions/cache/save@v4
        with:
          path: test-results/ci/isa-capability-eval-history.json
          key: isa-capability-history-${{ github.ref_name }}-${{ github.run_id }}

      - name: Create quality regression issue
        if: env.ISA_IMPLEMENTATION_ONLY_MODE != 'true' && (steps.assert.outcome == 'failure' || steps.drift.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().slice(0, 10);
            const title = `quality-regression: nightly capability eval failed (${date})`;

            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'quality-regression' });
            } catch {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: 'quality-regression',
                color: 'd73a4a',
                description: 'Nightly ISA quality regression requiring triage',
              });
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              labels: ['quality-regression'],
              body: [
                'Nightly ISA capability evaluation reported a blocking regression or major drift.',
                '',
                `- Workflow run: ${runUrl}`,
                `- Threshold assertion outcome: ${{ steps.assert.outcome }}`,
                `- Drift detection outcome: ${{ steps.drift.outcome }}`,
                '',
                'Required follow-up:',
                '1. Classify as INTEGRATE_NOW / RESOLVE_NOW / DROP_NOW.',
                '2. Attach evidence from artifacts.',
                '3. Open remediation PR with governance traceability.',
              ].join('\n'),
            });

      - name: Fail job on nightly regression
        if: env.ISA_IMPLEMENTATION_ONLY_MODE != 'true' && (steps.assert.outcome == 'failure' || steps.drift.outcome == 'failure')
        run: |
          set -euo pipefail
          echo "STOP=nightly_capability_regression"
          exit 1

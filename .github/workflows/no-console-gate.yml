name: No Console Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  no-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run scoped no-console gate
        run: |
          set -euo pipefail
          bash scripts/gates/no-console-gate.sh
